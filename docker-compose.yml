# docker-compose.yml
services:

  postgres:
    image: postgres:16
    restart: unless-stopped
    environment:
      POSTGRES_USER: mlops
      POSTGRES_PASSWORD: mlops_secret
      POSTGRES_DB: sentiment_db
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    env_file:
      - .env
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U mlops -d sentiment_db"]
      interval: 5s
      timeout: 5s
      retries: 5

  api:
    build:
      context: api
      dockerfile: Dockerfile
    restart: unless-stopped
    ports:
      - "${API_PORT:-8000}:8000"
    env_file:
      - .env
    depends_on:
      postgres:
        condition: service_healthy  # aspetta che postgres sia pronto
    volumes:
      - ./api:/app  # hot reload in sviluppo

volumes:
  postgres_data: