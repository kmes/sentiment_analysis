name: CI/CD Pipeline

on:
  push:
    branches:
      - main

jobs:
  test:
    name: Run Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Load .env.ci into GitHub ENV
        run: |
          grep -v '^#' .env.ci | grep -v '^$' >> $GITHUB_ENV

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: tests/requirements.txt

      # - name: Get HuggingFace model digest
      #   id: hf_digest
      #   run: |
      #     DIGEST=$(curl -sL "https://huggingface.co/api/models/${{ env.HF_MODEL_NAME }}" \
      #       | python3 -c "import sys,json; data=json.load(sys.stdin); print(data['sha'])")
      #     echo "digest=$DIGEST" >> $GITHUB_OUTPUT

      # - name: Cache ML model
      #   id: cache_model
      #   uses: actions/cache@v4
      #   with:
      #     path: api/${{ env.HF_MODEL_SAVE_PATH }}
      #     key: hf-model-${{ steps.hf_digest.outputs.digest }}

      # - name: Download model if not cached
      #   if: steps.cache_model.outputs.cache-hit != 'true'
      #   working-directory: api
      #   run: |
      #     pip install transformers torch accelerate
      #     python download_mlmodel.py

      - name: Build & start containers
        run: docker compose --env-file .env.ci up -d --build

      - name: Wait for API to be ready
        run: |
          for i in $(seq 1 30); do
            if curl -sf http://localhost:${{ env.API_PORT }}/status; then
              echo "API is up!"
              exit 0
            fi
            echo "Attempt $i/30 - retrying in 5s..."
            sleep 5
          done
          echo "API did not start in time, printing logs..."
          docker compose logs
          exit 1

      - name: Install test dependencies
        run: pip install -r tests/requirements.txt

      - name: Run tests
        run: pytest tests/ -v

      - name: Stop containers
        if: always()
        run: docker compose --env-file .env.ci down -v

  build-and-push:
    name: Build & Push Docker Image
    runs-on: ubuntu-latest
    needs: test

    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata for Docker
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository }}/api
          tags: |
            type=sha,prefix=sha-
            type=raw,value=latest

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: api
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
